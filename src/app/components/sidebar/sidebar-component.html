<aside class="sidebar">

  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">⬡</div>
    <span class="sidebar-brand-name">Architect AI</span>
  </div>

  <button class="sidebar-new-btn" (click)="onNewAssessment()">
    + New assessment
  </button>

  <p class="sidebar-section-label">Recent</p>

  <nav class="sidebar-sessions">
    @if (sessions.length === 0) {
      <div class="sidebar-empty">
        No sessions yet.<br />Start a new assessment.
      </div>
    }

    @for (session of sessions; track session.id) {
      <button
        class="sidebar-sessions-item"
        [class.sidebar-sessions-item-active]="activeSessionId === session.id"
        (click)="onSelectSession(session)">
        <span class="sidebar-sessions-icon" [attr.data-status]="session.status">
          @if (session.status === SessionStatus.Completed) { ✓ }
          @else if (session.status === SessionStatus.Failed) { ! }
          @else { ◎ }
        </span>
        <span class="sidebar-sessions-title">{{ session.title }}</span>
      </button>
    }
  </nav>

</aside>
