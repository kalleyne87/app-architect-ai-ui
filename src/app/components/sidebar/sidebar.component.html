<aside class="sidebar" [class.sidebar--open]="isOpen()">
  <div class="sidebar-brand">
    <img src="chatbot.png" width="30" height="30" alt="Chatbot Icon">
    <span class="sidebar-brand-name">Architect AI</span>
  </div>

  <button 
    class="sidebar-new-btn"
    [class.sidebar-new-btn-highlighted]="store.isSessionComplete()"
    [disabled]="store.isLoading() || store.isLoadingSession()"
    (click)="onNewAssessment()">
    + New assessment
  </button>

  <p class="sidebar-section-label">Recent</p>

  <nav class="sidebar-sessions">
    @if (store.sessionHistory().length === 0) {
      <div class="sidebar-empty">
        No sessions yet.<br />Start a new assessment.
      </div>
    }

    @for (session of store.sessionHistory(); track session.id) {
      <button
        class="sidebar-session-item"
        [class.sidebar-session-item-active]="store.activeSessionId() === session.id"
        [disabled]="store.isLoading() || store.isLoadingSession()"
        (click)="onSelectSession(session)">
        <span 
          class="sidebar-session-icon" 
          [attr.data-status]="session.status">
          @if (session.status === sessionStatus.Completed) { ✓ }
          @else if (session.status === sessionStatus.Failed) { ! }
          @else { ◎ }
        </span>
        <span class="sidebar-session-title">{{ session.title }}</span>
      </button>
    }
  </nav>
</aside>
<div class="sidebar-backdrop" [class.sidebar-backdrop--visible]="isOpen()" (click)="close.emit()"></div>
